{% extends 'core/base.html' %}
{% block title %}حذف دولة{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 30px auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #ede9fe; text-align: center;">
    <h2 style="color: #ef4444;">⚠️ تأكيد الحذف</h2>
    <p style="margin: 20px 0; font-size: 1.1rem;">هل أنتِ متأكدة من حذف الدولة <strong>{{ country.name }}</strong>؟</p>
    <p style="color:#b91c1c; font-size:0.9rem; font-weight:600;">تحذير: حذف الدولة هيحذف معاه كل الطلاب المسجلين فيها نهائيًا (مش مجرد إخفاء).</p>
    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
            <button type="submit" class="btn btn-danger">نعم، احذف</button>
            <a href="{% url 'countries_list' %}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
