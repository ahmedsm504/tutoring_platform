{% extends 'core/base.html' %}
{% block title %}إضافة دولة{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 30px auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #ede9fe;">
    <h2 style="color: #4a1a8a; text-align: center;">➕ إضافة دولة جديدة</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-top:20px;">
            <label style="font-weight:600; color:#4a1a8a;">اسم الدولة *</label>
            <input type="text" name="name" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe; margin-top:6px;">
        </div>
        <div style="margin-top:15px;">
            <label style="font-weight:600; color:#4a1a8a;">أيقونة العلم</label>
            <input type="text" name="flag_icon" placeholder="🇪🇬" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe; margin-top:6px;">
        </div>
        <div style="text-align:center; margin-top:25px;">
            <button type="submit" class="btn btn-primary">حفظ</button>
            <a href="{% url 'countries_list' %}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
