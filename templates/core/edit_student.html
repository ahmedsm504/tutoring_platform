{% extends 'core/base.html' %}
{% block title %}تعديل بيانات الطالب{% endblock %}
{% block content %}
<div style="max-width: 950px; margin: 30px auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #ede9fe;">
    <h2 style="color: #4a1a8a; text-align: center;">✏️ تعديل بيانات الطالب</h2>
    <form method="POST">
        {% csrf_token %}

        <div style="background:var(--violet-50); border:1.6px solid var(--violet-200); border-radius:16px; padding:16px 20px; margin-bottom:20px;">
            <label class="form-label" style="margin-bottom:10px;">نوع التسجيل *</label>
            <div class="flex" style="gap:22px;">
                <label class="flex" style="gap:8px; cursor:pointer; font-weight:600;">
                    <input type="radio" name="enrollment_type" value="new" {% if student.enrollment_type == 'new' %}checked{% endif %} onchange="toggleSourceField()"> طالب جديد
                </label>
                <label class="flex" style="gap:8px; cursor:pointer; font-weight:600;">
                    <input type="radio" name="enrollment_type" value="existing" {% if student.enrollment_type == 'existing' %}checked{% endif %} onchange="toggleSourceField()"> مسجل من قبل
                </label>
            </div>
            <div id="sourceFieldWrap" class="field" style="margin-top:14px; max-width:320px;">
                <label>مصدر الطالب</label>
                <select name="acquisition_source">
                    <option value="ad" {% if student.acquisition_source == 'ad' %}selected{% endif %}>إعلان</option>
                    <option value="referral" {% if student.acquisition_source == 'referral' %}selected{% endif %}>توصية</option>
                    <option value="website" {% if student.acquisition_source == 'website' %}selected{% endif %}>الموقع</option>
                    <option value="social_media" {% if student.acquisition_source == 'social_media' %}selected{% endif %}>سوشيال ميديا</option>
                    <option value="other" {% if student.acquisition_source == 'other' %}selected{% endif %}>أخرى</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 20px;">
            <div>
                <label style="font-weight:600; color:#4a1a8a;">الدولة *</label>
                <select name="country" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;">
                    {% for c in countries %}
                    <option value="{{ c.id }}" {% if c.id == student.country.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="font-weight:600; color:#4a1a8a;">المعلمة</label>
                <select name="teacher" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;">
                    <option value="">--- اختر ---</option>
                    {% for t in teachers %}
                    <option value="{{ t.id }}" {% if student.teacher and t.id == student.teacher.id %}selected{% endif %}>{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div><label style="font-weight:600; color:#4a1a8a;">اسم الطالب *</label><input type="text" name="name" value="{{ student.name }}" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">السن</label><input type="number" name="age" value="{{ student.age|default_if_none:'' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">رقم الهاتف</label><input type="text" name="phone" value="{{ student.phone|default_if_none:'' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">المحافظة</label><input type="text" name="governorate" value="{{ student.governorate|default_if_none:'' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">اسم الباقة</label><input type="text" name="package_name" value="{{ student.package_name|default_if_none:'' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">عدد الحلقات</label><input type="number" name="lessons_count" value="{{ student.lessons_count }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">الشهر *</label><input type="text" name="month" value="{{ student.month }}" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">قيمة الاشتراك</label><input type="number" name="subscription_fee" step="0.01" value="{{ student.subscription_fee }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">تاريخ بداية الاشتراك</label><input type="date" name="start_date" value="{{ student.start_date|date:'Y-m-d' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">تاريخ نهاية الاشتراك</label><input type="date" name="end_date" value="{{ student.end_date|date:'Y-m-d' }}" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div>
                <label style="font-weight:600; color:#4a1a8a;">حالة الدفع</label>
                <select name="payment_status" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;">
                    <option value="paid" {% if student.payment_status == 'paid' %}selected{% endif %}>مدفوع</option>
                    <option value="pending" {% if student.payment_status == 'pending' %}selected{% endif %}>مستحق</option>
                    <option value="overdue" {% if student.payment_status == 'overdue' %}selected{% endif %}>متأخر</option>
                </select>
            </div>
            <div>
                <label style="font-weight:600; color:#4a1a8a;">حالة الطالب</label>
                <select name="status" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;">
                    <option value="active" {% if student.status == 'active' %}selected{% endif %}>مقيد</option>
                    <option value="inactive" {% if student.status == 'inactive' %}selected{% endif %}>غير مقيد</option>
                </select>
            </div>
        </div>
        <div style="margin-top:20px;">
            <label style="font-weight:600; color:#4a1a8a;">ملاحظات عامة</label>
            <textarea name="notes" rows="2" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;">{{ student.notes|default_if_none:'' }}</textarea>
        </div>
        <div style="text-align:center; margin-top:25px;">
            <button type="submit" class="btn btn-primary">تحديث الطالب</button>
            <a href="{% url 'student_detail' student.id %}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div>

<script>
function toggleSourceField(){
    const isNew = document.querySelector('input[name="enrollment_type"][value="new"]').checked;
    document.getElementById('sourceFieldWrap').style.display = isNew ? 'block' : 'none';
}
document.addEventListener('DOMContentLoaded', toggleSourceField);
</script>
{% endblock %}
