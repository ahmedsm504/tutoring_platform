{% extends 'core/base.html' %}
{% block title %}إضافة معلمة{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 30px auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #ede9fe;">
    <h2 style="color: #4a1a8a; text-align: center;">👩‍🏫 إضافة معلمة جديدة</h2>
    <p class="text-center text-muted" style="font-size:0.88rem; margin-top:6px;">
    </p>
    <form method="POST">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 20px;">
            <div style="grid-column: span 2;"><label style="font-weight:600; color:#4a1a8a;">الاسم *</label><input type="text" name="name" required style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">السن</label><input type="number" name="age" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">المحافظة</label><input type="text" name="governorate" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">رقم الهاتف</label><input type="text" name="phone" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
            <div><label style="font-weight:600; color:#4a1a8a;">واتساب</label><input type="text" name="whatsapp" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ede9fe;"></div>
        </div>
        <div style="text-align:center; margin-top:25px;">
            <button type="submit" class="btn btn-primary">حفظ المعلمة</button>
            <a href="{% url 'teachers_list' %}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
